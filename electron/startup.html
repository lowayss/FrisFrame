<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
    <title>FrisFrame 시작 오류</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; }
      body { display: grid; min-height: 100vh; margin: 0; place-items: center; background: #0b0f12; color: #dce5e4; }
      main { width: min(560px, calc(100vw - 56px)); }
      span { color: #ff796c; font-size: 12px; font-weight: 800; }
      h1 { margin: 10px 0 12px; font-size: 26px; }
      p { margin: 0; color: #9ba8aa; font-size: 14px; line-height: 1.7; }
      code { display: block; margin-top: 20px; padding: 14px; border: 1px solid #364146; background: #12191d; color: #d8c18a; font-size: 12px; line-height: 1.55; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <main>
      <span>FRISFRAME STARTUP</span>
      <h1>앱을 시작하지 못했습니다</h1>
      <p>FrisFrame을 종료한 뒤 다시 실행해 주세요. 같은 문제가 반복되면 아래 내용을 점검 기록과 함께 확인합니다.</p>
      <code id="message">알 수 없는 시작 오류</code>
    </main>
    <script>document.getElementById("message").textContent = new URLSearchParams(location.search).get("message") || "알 수 없는 시작 오류";</script>
  </body>
</html>
