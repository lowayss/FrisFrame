<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FrisFrame 라이센스 활성화</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-color: #0b0d10;
        --card-bg: rgba(22, 28, 36, 0.45);
        --card-border: rgba(255, 255, 255, 0.08);
        --primary-color: #ff6b55;
        --primary-hover: #ff8573;
        --primary-glow: rgba(255, 107, 85, 0.35);
        --text-color: #f3f4f6;
        --text-muted: #9ca3af;
        --error-color: #ef4444;
        --success-color: #10b981;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Glowing background meshes */
      body::before {
        content: "";
        position: absolute;
        width: 450px;
        height: 450px;
        background: radial-gradient(circle, var(--primary-glow) 0%, rgba(0,0,0,0) 70%);
        top: -100px;
        left: -100px;
        z-index: 1;
        opacity: 0.8;
        filter: blur(40px);
        pointer-events: none;
      }

      body::after {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(127, 159, 187, 0.15) 0%, rgba(0,0,0,0) 70%);
        bottom: -150px;
        right: -150px;
        z-index: 1;
        opacity: 0.8;
        filter: blur(40px);
        pointer-events: none;
      }

      .container {
        width: 100%;
        max-width: 440px;
        padding: 20px;
        z-index: 10;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 40px 30px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        position: relative;
        overflow: hidden;
        animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes cardAppear {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .brand {
        text-align: center;
        margin-bottom: 35px;
      }

      .brand-mark {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, var(--primary-color), #ff8573);
        border-radius: 14px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        font-weight: 800;
        font-size: 26px;
        color: #fff;
        margin-bottom: 15px;
        box-shadow: 0 8px 24px var(--primary-glow);
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      }

      .brand h1 {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(to right, #ffffff, #e5e7eb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }

      .brand p {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.5;
        font-weight: 300;
      }

      .form-group {
        margin-bottom: 24px;
      }

      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper input {
        width: 100%;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 14px 16px;
        font-family: inherit;
        font-size: 15px;
        color: #fff;
        transition: all 0.3s ease;
        outline: none;
        letter-spacing: 1px;
      }

      .input-wrapper input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px var(--primary-glow);
        background: rgba(0, 0, 0, 0.4);
      }

      .input-wrapper input::placeholder {
        color: #4b5563;
        font-weight: 300;
      }

      .submit-btn {
        width: 100%;
        background: var(--primary-color);
        border: none;
        border-radius: 10px;
        padding: 14px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 12px var(--primary-glow);
      }

      .submit-btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px var(--primary-glow);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .message-box {
        margin-top: 20px;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 13.5px;
        display: none;
        line-height: 1.4;
      }

      .message-box.error {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.25);
        color: #fca5a5;
        display: block;
      }

      .message-box.success {
        background: rgba(16, 185, 129, 0.12);
        border: 1px solid rgba(16, 185, 129, 0.25);
        color: #a7f3d0;
        display: block;
      }

      .footer-note {
        text-align: center;
        margin-top: 30px;
        font-size: 12px;
        color: #4b5563;
        font-weight: 300;
      }

      /* Spinner animation */
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
        display: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="brand">
          <div class="brand-mark">F</div>
          <h1>FrisFrame</h1>
          <p>사전 연출(Pre-visualization) 및 구도 설계 툴<br>이 서비스를 사용하려면 라이센스 인증이 필요합니다.</p>
        </div>

        <form id="activationForm">
          <div class="form-group">
            <label for="licenseKey">라이센스 키 입력</label>
            <div class="input-wrapper">
              <input
                type="text"
                id="licenseKey"
                placeholder="FRIS-XXXX-XXXX-XXXX"
                required
                autocomplete="off"
                spellcheck="false"
              />
            </div>
          </div>

          <button type="submit" id="submitBtn" class="submit-btn">
            <div id="btnSpinner" class="spinner"></div>
            <span id="btnText">라이센스 활성화</span>
          </button>
        </form>

        <div id="messageBox" class="message-box"></div>
      </div>
      <div class="footer-note">
        Copyright (c) 2026 Egoist Film · FrisFrame MIT License
      </div>
    </div>

    <script>
      const form = document.getElementById("activationForm");
      const licenseInput = document.getElementById("licenseKey");
      const submitBtn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      const btnSpinner = document.getElementById("btnSpinner");
      const messageBox = document.getElementById("messageBox");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        // UI Reset
        messageBox.className = "message-box";
        messageBox.style.display = "none";
        submitBtn.disabled = true;
        btnSpinner.style.display = "block";
        btnText.textContent = "검증 중...";

        const licenseKey = licenseInput.value.trim();

        try {
          const response = await fetch("/api/license/activate", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ licenseKey }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            messageBox.textContent = "라이센스가 활성화되었습니다! 곧 웹 에디터로 진입합니다.";
            messageBox.className = "message-box success";
            messageBox.style.display = "block";
            
            // Redirect after 1 second
            setTimeout(() => {
              window.location.reload();
            }, 1000);
          } else {
            throw new Error(data.error || "라이센스 활성화에 실패했습니다.");
          }
        } catch (error) {
          messageBox.textContent = error.message;
          messageBox.className = "message-box error";
          messageBox.style.display = "block";
          
          // Reset UI
          submitBtn.disabled = false;
          btnSpinner.style.display = "none";
          btnText.textContent = "라이센스 활성화";
        }
      });
    </script>
  </body>
</html>
